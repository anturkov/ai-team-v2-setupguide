# =============================================================================
# OpenClaw Configuration - Laptop (Monitor & Light Duties)
# Machine: 192.168.1.113 | Quadro T2000 4GB | 64GB RAM | 12 cores
# Role: Worker - monitoring agent and DevOps tasks
# =============================================================================

node:
  name: "laptop-monitor"
  role: "worker"
  host: "192.168.1.113"
  port: 8080
  description: "Laptop for monitoring and light duties"

# Cluster configuration
cluster:
  discovery:
    mode: "static"
    coordinator:
      host: "192.168.1.106"
      port: 8080
  health_check:
    interval_seconds: 15
    timeout_seconds: 5
    failure_threshold: 3
  secret: "CHANGE_ME_TO_A_SECURE_RANDOM_STRING"

# Ollama integration
ollama:
  host: "127.0.0.1"
  port: 11434
  timeout_seconds: 300
  max_concurrent_requests: 1

# File access
files:
  allowed_paths:
    - "C:\\AI-Team\\repos"
    - "C:\\AI-Team\\temp"
    - "C:\\AI-Team\\logs"
  denied_paths:
    - "C:\\Windows"
    - "C:\\Program Files"
    - "C:\\Users\\*\\AppData"
  max_file_size_mb: 100

# Error handling
error_handling:
  retry:
    max_attempts: 3
    backoff_strategy: "exponential"
    initial_delay_seconds: 5
    max_delay_seconds: 60

# Message queue
queue:
  max_size: 50
  max_retries: 3
  retry_backoff: "5,15,60"
  message_ttl_minutes: 30

# Logging
logging:
  level: "info"
  file: "C:\\AI-Team\\openclaw\\logs\\openclaw.log"
  max_size_mb: 50
  max_files: 3
  audit:
    enabled: true
    path: "C:\\AI-Team\\logs"
    include_message_content: true
    retention_days: 30
