# =============================================================================
# Telegram Bot Configuration Reference
# Used by: PC1 (Coordinator)
#
# This is a REFERENCE FILE. The actual Telegram config lives inside PC1's
# ~/.openclaw/openclaw.json under the "channels.telegram" key.
# See configs/openclaw-pc1.json5 and Chapter 07 for implementation details.
# =============================================================================

# Telegram channel section in openclaw.json (JSON5 format):
#
# channels: {
#   telegram: {
#     botToken: "YOUR_BOT_TOKEN_HERE",       // From BotFather
#     enabled: true,
#     dmPolicy: "allowlist",                 // pairing | allowlist | open | disabled
#     historyLimit: 50,
#     mediaMaxMb: 100,
#     streaming: "off",                      // off | partial | block | progress
#     groups: {
#       // Optional: configure group access
#       // "-1001234567890": {
#       //   allowFrom: ["@yourusername"],
#       //   requireMention: true
#       // }
#     }
#   }
# }

# The Telegram channel is bound to the Coordinator agent via:
#   openclaw agents bind --channel telegram --agent coordinator

# Bot personality is defined in the Coordinator's SOUL.md, not in config.
# Task routing commands (/status, /assign, /review, etc.) are implemented
# as Coordinator skills in ~/.openclaw/workspace-coordinator/skills/

# ---- Reference: Bot Commands as Coordinator Skills ----
# Each command below should be implemented as a skill in the Coordinator's
# workspace. The Coordinator interprets natural language from Telegram and
# invokes the appropriate action.

commands:
  status:
    description: "Check team status and active tasks"
    implementation: "Coordinator agent interprets and reports"

  assign:
    description: "Assign a task to the team"
    implementation: "Coordinator decomposes task and dispatches via webhooks"

  review:
    description: "Request a code review"
    implementation: "Coordinator dispatches to quality-agent and security-agent"

  deploy:
    description: "Trigger a deployment"
    implementation: "Coordinator dispatches to devops-agent with safety checks"

  health:
    description: "Check system health"
    implementation: "Coordinator dispatches to monitoring-agent via webhook"

  cancel:
    description: "Cancel current task"
    implementation: "Coordinator notifies all involved agents to stop"
