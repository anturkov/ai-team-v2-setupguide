# =============================================================================
# AI Development Team - Team Reference Configuration
# This is a REFERENCE FILE documenting team structure, roles, and routing.
# OpenClaw does NOT load this file directly. Instead, this information is
# implemented as:
#   - Agent definitions in each machine's ~/.openclaw/openclaw.json
#   - SOUL.md files in each agent's workspace
#   - Dispatch skills in the Coordinator's workspace
#   - Webhook URLs between Gateways
# See Chapter 06 for implementation details.
# =============================================================================

team:
  name: "AI Development Team"
  version: "2.0"

# ---- Machine & Gateway Layout ----
machines:
  pc1:
    ip: "192.168.1.106"
    gateway_port: 18789
    webhook_url: "http://192.168.1.106:18789/hooks/agent"
    hardware: "RTX 4090 24GB | 64GB RAM | 32 cores"
    agents:
      - coordinator
      - senior-engineer-1
      - senior-engineer-2

  pc2:
    ip: "192.168.1.112"
    gateway_port: 18789
    webhook_url: "http://192.168.1.112:18789/hooks/agent"
    hardware: "RTX 2080 Ti 11GB | 64GB RAM | 24 cores"
    agents:
      - quality-agent
      - security-agent

  laptop:
    ip: "192.168.1.113"
    gateway_port: 18789
    webhook_url: "http://192.168.1.113:18789/hooks/agent"
    hardware: "Quadro T2000 4GB | 64GB RAM | 12 cores"
    agents:
      - devops-agent
      - monitoring-agent

# ---- Role Definitions ----
# Each role maps to an OpenClaw agent with its own workspace and SOUL.md
roles:
  coordinator:
    machine: "pc1"
    description: "Central command and human interface"
    telegram_bound: true        # Telegram channel routed to this agent
    capabilities:
      - task_decomposition
      - task_assignment
      - conflict_resolution
      - human_communication
      - external_consultation

  senior-engineer-1:
    machine: "pc1"
    description: "Architecture and complex problem solving"
    capabilities:
      - architecture_design
      - code_review
      - technical_specification
      - system_design

  senior-engineer-2:
    machine: "pc1"
    description: "Implementation and optimization"
    capabilities:
      - code_implementation
      - optimization
      - refactoring
      - debugging
      - unit_testing

  quality-agent:
    machine: "pc2"
    description: "Code review, testing, documentation"
    capabilities:
      - code_review
      - test_creation
      - documentation
      - style_checking
      - best_practices

  security-agent:
    machine: "pc2"
    description: "Security analysis and best practices"
    capabilities:
      - vulnerability_scanning
      - security_review
      - dependency_audit
      - compliance_checking
      - threat_modeling

  devops-agent:
    machine: "laptop"
    description: "Deployment and infrastructure"
    capabilities:
      - deployment
      - ci_cd
      - infrastructure
      - git_workflow
      - containerization

  monitoring-agent:
    machine: "laptop"
    description: "Resource tracking and performance analysis"
    capabilities:
      - resource_monitoring
      - performance_analysis
      - alerting
      - health_reporting

  external-consultant:
    type: "external"
    provider: "anthropic"       # Configured in PC1's models.providers.anthropic
    description: "Complex problems requiring advanced reasoning"
    capabilities:
      - complex_reasoning
      - code_generation
      - architecture_review
      - second_opinion

# ---- Task Routing Rules ----
# Implemented in Coordinator's SOUL.md and dispatch skill
task_routing:
  architecture:
    primary: "senior-engineer-1"
    reviewer: "quality-agent"
  implementation:
    primary: "senior-engineer-2"
    reviewer: "quality-agent"
    security_check: "security-agent"
  bug_fix:
    primary: "senior-engineer-2"
    reviewer: "quality-agent"
  security_audit:
    primary: "security-agent"
    reviewer: "senior-engineer-1"
  deployment:
    primary: "devops-agent"
    reviewer: "security-agent"
  documentation:
    primary: "quality-agent"
  performance:
    primary: "monitoring-agent"
    consultant: "senior-engineer-1"
  complex_problem:
    primary: "external-consultant"
    reviewer: "senior-engineer-1"

# ---- Escalation Rules ----
# Implemented in Coordinator's SOUL.md
escalation:
  conditions:
    - type: "conflict_unresolved"
      timeout_minutes: 10
    - type: "task_stalled"
      timeout_minutes: 30
    - type: "security_violation"
      immediate: true
    - type: "resource_critical"
      immediate: true
    - type: "restricted_action_requested"
      immediate: true

# ---- Degradation Rules ----
# Implemented in Coordinator's SOUL.md
degradation:
  pc2_offline:
    reassign_to_coordinator: ["quality-agent", "security-agent"]
    notify_human: true
    message: "PC2 offline - reduced review capability"
  laptop_offline:
    reassign_to_coordinator: ["devops-agent"]
    pause: ["monitoring-agent"]
    notify_human: true
    message: "Laptop offline - monitoring paused"
  pc1_offline:
    action: "human_intervention_required"
    notify_human: true
    message: "CRITICAL - PC1 offline. Coordinator unavailable."

# ---- Monitoring Thresholds ----
# Implemented in monitoring-agent's SOUL.md and monitoring scripts
monitoring:
  thresholds:
    gpu_temp_warning: 80
    gpu_temp_critical: 90
    vram_warning_percent: 90
    vram_critical_percent: 95
    ram_warning_percent: 85
    ram_critical_percent: 90
    disk_warning_gb: 10
    disk_critical_gb: 5
    model_response_warning_seconds: 60
    model_response_critical_seconds: 120
